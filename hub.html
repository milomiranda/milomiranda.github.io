    #name-header {
      text-align: center;
      font-family: 'Roboto', sans-serif;

      font-size: 1rem;

    }

    body {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;

    h1, h2, h3, h4, h5, h6, p, a, strong {

    }

      margin: 0 auto;
      padding: 0 1rem;
    }

    h1 {

      color: #222;
    }

    .links-section {
      margin-top: 0.8rem;
      text-align: left;
    }

    .links-section a {
      display: block;
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      color: #222;
      text-decoration: none;
      margin-bottom: 0.6rem;
      line-height: 1.2;
    }

    .links-section a:hover {
      text-decoration: underline;
      color: #222;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
    }

    footer p, footer h3 {
      font-size: 0.8rem;
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      color: #222;
      margin: 0.5rem auto;
      text-align: center;
    }

    .divider {
      border: none;

      margin: 1.2rem 0;
