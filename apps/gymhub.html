<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f6f6f4; --card: #fff; --border: #ebebeb;
  --text: #111; --muted: #aaa; --accent: #c5fe00;
  --green: #16a34a; --green-bg: #f0fdf4; --green-border: #86efac;
  --orange: #ea580c; --orange-bg: #fff7ed; --orange-border: #fb923c;
  --shadow: 0 2px 16px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

.back-btn { position: fixed; top: 20px; left: 20px; z-index: 200; display: flex; align-items: center; gap: 6px; background: var(--card); border: 2px solid var(--border); border-radius: 30px; padding: 7px 14px; font-size: 12px; font-weight: 700; color: var(--text); text-decoration: none; box-shadow: var(--shadow); transition: border-color 0.15s; }
.back-btn:hover { border-color: var(--accent); }

header { max-width: 760px; margin: 0 auto; padding: 52px 24px 20px; text-align: center; }
.badge { display: inline-block; background: var(--accent); border-radius: 999px; padding: 5px 16px; margin-bottom: 12px; font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
header h1 { font-size: clamp(28px, 5vw, 44px); font-weight: 900; letter-spacing: -0.05em; margin-bottom: 6px; }
header p { color: var(--muted); font-size: 14px; font-weight: 500; }

.wrap { max-width: 760px; margin: 0 auto; padding: 0 24px; display: flex; flex-direction: column; gap: 14px; }

/* CHIPS */
.chips-wrap { display: flex; flex-direction: column; gap: 9px; }
.chips-label { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.chips-row { display: flex; gap: 7px; flex-wrap: wrap; }
.chip { padding: 8px 16px; border-radius: 999px; border: 2px solid var(--border); background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow); line-height: 1; }
.chip:hover { border-color: var(--text); transform: translateY(-1px); }
.chip.active { background: var(--text); color: #fff; border-color: var(--text); }
.chip-sub { font-size: 10px; font-weight: 500; opacity: 0.5; display: block; margin-top: 1px; }



/* LEGEND */
.legend { display: flex; gap: 14px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--muted); }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.leg-dot.green { background: var(--green); }
.leg-dot.orange { background: var(--orange); }

/* SECTION DIVIDER */
.sec-divider { display: flex; align-items: center; gap: 10px; }
.sec-divider span { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.sec-divider::before, .sec-divider::after { content:''; flex:1; height:1px; background: var(--border); }

/* EX LIST */
.ex-list { display: flex; flex-direction: column; gap: 6px; animation: fadeUp 0.22s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* EX CARD */
.ex-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
.ex-card.green { border-color: var(--green-border); }
.ex-card.orange { border-color: var(--orange-border); }

.ex-main-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; position: relative; }
.ex-card.green .ex-main-row { background: var(--green-bg); }
.ex-card.orange .ex-main-row { background: var(--orange-bg); }

.ex-stripe { width: 3px; height: 100%; position: absolute; left: 0; top: 0; bottom: 0; border-radius: 3px 0 0 3px; }
.ex-card.green .ex-stripe { background: var(--green); }
.ex-card.orange .ex-stripe { background: var(--orange); }

.ex-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; margin-top: 1px; }
.ex-dot.green { background: var(--green); color: #fff; }
.ex-dot.orange { background: var(--orange); color: #fff; }

.ex-body { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 800; line-height: 1.2; }
.ex-meta { display: flex; gap: 7px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
.ex-sets { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); font-weight: 500; }
.ex-badge { font-size: 9px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
.ex-badge.machine { background: #f0f0f0; color: #777; }
.ex-badge.free { background: #dbeafe; color: #1d4ed8; }
.ex-badge.body { background: #ede9fe; color: #6d28d9; }
.ex-tip { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 4px; line-height: 1.4; }
.ex-swapped-tag { font-size: 10px; font-weight: 600; color: var(--muted); font-style: italic; margin-left: 5px; }

.ex-actions { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; flex-shrink: 0; }
.swap-btn { background: none; border: 1.5px solid var(--border); border-radius: 7px; padding: 4px 9px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.swap-btn:hover { border-color: var(--text); color: var(--text); }
.swap-btn.open { background: var(--text); color: #fff; border-color: var(--text); }



/* SWAP PANEL */
.swap-panel { background: #111; padding: 14px; display: none; flex-direction: column; gap: 7px; border-top: 2px solid #222; }
.swap-panel.open { display: flex; animation: fadeUp 0.18s ease; }
.swap-title { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
.swap-opt { background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 9px; padding: 9px 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 10px; }
.swap-opt:hover { background: rgba(197,254,0,0.1); border-color: rgba(197,254,0,0.35); }
.swap-opt.selected { border-color: var(--accent); background: rgba(197,254,0,0.15); }
.swap-opt-name { font-size: 13px; font-weight: 700; color: #fff; flex: 1; }
.swap-opt-sets { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.35); white-space: nowrap; }
.swap-opt-badge { font-size: 9px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 99px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); white-space: nowrap; }
.swap-close-btn { background: none; border: 1.5px solid rgba(255,255,255,0.12); border-radius: 7px; padding: 5px 10px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); cursor: pointer; align-self: flex-start; transition: all 0.15s; margin-top: 2px; }
.swap-close-btn:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

/* HIIT CARD */
.hiit-card { background: #111; border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-md); }
.hiit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.hiit-title { font-size: 13px; font-weight: 800; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; }
.hiit-sub { font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 500; margin-top: 2px; }
.hiit-counter { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.07); border-radius: 99px; padding: 3px 10px; }
.hiit-counter.full { color: var(--accent); background: rgba(197,254,0,0.15); }
.hiit-exercises { display: flex; flex-direction: column; gap: 7px; }
.hiit-ex { background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.15s; user-select: none; }
.hiit-ex:hover { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.2); }
.hiit-ex.selected { background: rgba(197,254,0,0.12); border-color: rgba(197,254,0,0.5); }
.hiit-ex-check { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.15s; }
.hiit-ex.selected .hiit-ex-check { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 900; }
.hiit-ex-icon { font-size: 16px; flex-shrink: 0; }
.hiit-ex-body { flex: 1; }
.hiit-ex-name { font-size: 13px; font-weight: 700; color: #fff; }
.hiit-ex.selected .hiit-ex-name { color: var(--accent); }
.hiit-ex-detail { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; font-family: 'DM Mono', monospace; }
.hiit-badge { font-size: 9px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
.hiit-badge.high { background: rgba(239,68,68,0.2); color: #f87171; }
.hiit-badge.med { background: rgba(234,179,8,0.2); color: #fbbf24; }

/* PHASE PILL */
.phase-pill { display: flex; align-items: center; gap: 8px; background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 10px 16px; font-size: 13px; color: var(--muted); font-weight: 500; box-shadow: var(--shadow); }
.phase-pill strong { color: var(--text); font-weight: 800; }

/* PLACEHOLDER */
.placeholder { text-align: center; padding: 44px 20px; color: var(--muted); }
.placeholder .big { font-size: 38px; margin-bottom: 10px; }
.placeholder p { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.placeholder small { font-size: 12px; }

footer { text-align: center; padding: 48px 20px 0; font-size: 12px; color: var(--muted); font-weight: 500; }

@media (max-width: 600px) {
  header, .wrap { padding-left: 16px; padding-right: 16px; }
  header { padding-top: 64px; }
  .guide-imgs { flex-direction: column; align-items: center; }
}
</style>
</head>

// ─── STATE ──────────────────────────────────────────────────────────────────
let activeGroup = null, swaps = {}, openSwap = null, hiitSelected = {};

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  const container = document.getElementById('chips-container');
  SPLITS.forEach(split => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.id = 'chip-' + split.id;
    chip.innerHTML = `${split.label}<span class="chip-sub">${split.sub}</span>`;
    chip.onclick = () => selectSplit(split);
    container.appendChild(chip);
  });
}

function selectSplit(split) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-' + split.id).classList.add('active');

  activeGroup = split.groups[0];
  swaps = {}; openSwap = null; hiitSelected = {};

  let html = '';
  if (split.groups.length > 1) {
    html += `<div style="display:flex;gap:7px;flex-wrap:wrap;">`;
    split.groups.forEach(gid => {
      const g = GROUPS[gid];
      html += `<button class="chip${gid===activeGroup?' active':''}" id="subchip-${gid}" onclick="selectGroup('${gid}')" style="font-size:12px;padding:6px 13px;">${g.label}</button>`;
    });
    html += `</div>`;
  }

  html += `<div id="group-exercises"></div>`;
  document.getElementById('ex-area').innerHTML = html;
  renderGroupExercises();
}

function selectGroup(gid) {
  activeGroup = gid; swaps = {}; openSwap = null; hiitSelected = {};
  document.querySelectorAll('[id^="subchip-"]').forEach(c => {
    c.classList.toggle('active', c.id === 'subchip-' + gid);
  });
  renderGroupExercises();
}

function renderGroupExercises() {
  const g = GROUPS[activeGroup];
  if (!g) return;
  let html = '<div class="ex-list">';
  html += `<div class="phase-pill">🔥 <strong>Warmup:</strong>&nbsp;${g.warmup}</div>`;
  html += `<div class="sec-divider"><span>Exercises</span></div>`;

  g.exercises.forEach(ex => {
    html += renderExCard(ex, g);
  });

  // HIIT
  const MAX_HIIT = 3;
  const selCount = Object.values(hiitSelected).filter(Boolean).length;
  html += `<div class="sec-divider"><span>HIIT — 8 to 10 min</span></div>`;
  html += `<div class="hiit-card">
    <div class="hiit-header">
      <div><div class="hiit-title">⚡ HIIT Circuit</div><div class="hiit-sub">Pick up to 3 exercises for today.</div></div>
      <div class="hiit-counter${selCount===MAX_HIIT?' full':''}">${selCount}/${MAX_HIIT} selected</div>
    </div>
    <div class="hiit-exercises">`;
  g.hiit.forEach((h, i) => {
    const sel = !!hiitSelected[i];
    const disabled = !sel && selCount >= MAX_HIIT;
    html += `<div class="hiit-ex${sel?' selected':''}" onclick="toggleHiit(${i})">
      <div class="hiit-ex-check">${sel?'✓':''}</div>
      <div class="hiit-ex-icon">${h.icon}</div>
      <div class="hiit-ex-body">
        <div class="hiit-ex-name">${h.name}</div>
        <div class="hiit-ex-detail">${h.detail}</div>
      </div>
      <div class="hiit-badge ${h.intensity}">${h.intensity==='high'?'🔴 High':'🟡 Med'}</div>
    </div>`;
  });
  html += `</div></div>`;
  html += `<div class="phase-pill">🧘 <strong>Stretching:</strong>&nbsp;8–10 min — focus on muscles worked today</div>`;
  html += '</div>';

  document.getElementById('group-exercises').innerHTML = html;
}

function renderExCard(ex, g) {
  const sid = swaps[ex.id];
  const altData = sid ? (g.alts[sid] || null) : null;
  const cur = altData ? {...altData, color:ex.color} : ex;
  const isSwapOpen = openSwap === ex.id;
  const hasAlts = ex.alts && ex.alts.length > 0;

  let html = `<div id="wrap-${ex.id}"><div class="ex-card ${cur.color}">`;
  html += `<div class="ex-stripe"></div>`;
  html += `<div class="ex-main-row">`;
  html += `<div class="ex-dot ${cur.color}">${cur.color==='green'?'✓':'!'}</div>`;
  html += `<div class="ex-body">
    <div class="ex-name">${cur.name}${sid?'<span class="ex-swapped-tag">swapped</span>':''}</div>
    <div class="ex-meta">
      <span class="ex-sets">${cur.sets}</span>
      <span class="ex-badge ${cur.type||ex.type}">${TL[cur.type||ex.type]}</span>
    </div>
    ${(cur.tip||ex.tip) ? `<div class="ex-tip">💡 ${sid && altData && altData.tip ? altData.tip : ex.tip}</div>` : ''}
  </div>`;
  html += `<div class="ex-actions">`;
  if (hasAlts) html += `<button class="swap-btn${isSwapOpen?' open':''}" onclick="toggleSwap('${ex.id}')">⇄ ${sid?'Undo':'Swap'}</button>`;
  html += `</div></div>`;

  // Swap panel
  if (isSwapOpen && hasAlts) {
    html += `<div class="swap-panel open"><div class="swap-title">Pick a replacement</div>`;
    if (sid) html += `<div class="swap-opt" onclick="applySwap('${ex.id}',null)"><div class="swap-opt-name">${ex.name} <span style="font-size:10px;color:var(--accent)">↩ Original</span></div><span class="swap-opt-sets">${ex.sets}</span><span class="swap-opt-badge">${TL[ex.type]}</span></div>`;
    ex.alts.forEach(aid => {
      const alt = g.alts[aid];
      if (!alt) return;
      html += `<div class="swap-opt${sid===aid?' selected':''}" onclick="applySwap('${ex.id}','${aid}')"><div class="swap-opt-name">${alt.name}${alt.tip?`<span style="display:block;font-size:10px;color:rgba(255,255,255,0.35);font-weight:500;margin-top:2px">${alt.tip}</span>`:''}</div><span class="swap-opt-sets">${alt.sets}</span><span class="swap-opt-badge">${TL[alt.type]}</span></div>`;
    });
    html += `<button class="swap-close-btn" onclick="toggleSwap('${ex.id}')">✕ Close</button></div>`;
  }

  html += `</div></div>`;
  return html;
}

function toggleSwap(exId) { openSwap = openSwap===exId?null:exId; renderGroupExercises(); }
function applySwap(exId, altId) { if(altId===null) delete swaps[exId]; else swaps[exId]=altId; openSwap=null; renderGroupExercises(); }
function toggleHiit(idx) {
  const sel = !!hiitSelected[idx];
  const selCount = Object.values(hiitSelected).filter(Boolean).length;
  if (!sel && selCount >= 3) return; // max 3
  hiitSelected[idx] = !sel;
  renderGroupExercises();
}

init();
</script>
